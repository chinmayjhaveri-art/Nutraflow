<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NutraFlow</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- NAVIGATION -->

<nav>

<div class="logo">

🌿 NutraFlow

</div>

<ul>

<li><a href="#">Home</a></li>

<li><a href="#popular">Foods</a></li>

<li><a href="#result">Nutrition</a></li>

</ul>

<button id="darkModeBtn">

🌙

</button>

</nav>

<!-- HERO -->

<section class="hero">

<div class="hero-left">

<h1>

Know Your Food.

</h1>

<h2>

Fuel Your Future.

</h2>

<p>

Search thousands of foods and instantly discover calories,
protein, carbs, sugar, fiber and nutrition insights.

</p>

<div class="search-container">

<input
id="foodInput"
type="text"
placeholder="Search Apple, Rice, Pizza...">

<button onclick="searchFood()">

Search

</button>

</div>

</div>

<div class="hero-right">

<img
src="https://images.unsplash.com/photo-1490645935967-10de6ba17061?w=700"
alt="Healthy Food">

</div>

</section>

<!-- POPULAR -->

<section
class="popular"
id="popular">

<h2>

🔥 Trending Foods

</h2>

<div class="chips">

<button onclick="quickSearch('Apple')">🍎 Apple</button>

<button onclick="quickSearch('Banana')">🍌 Banana</button>

<button onclick="quickSearch('Avocado')">🥑 Avocado</button>

<button onclick="quickSearch('Rice')">🍚 Rice</button>

<button onclick="quickSearch('Pizza')">🍕 Pizza</button>

<button onclick="quickSearch('Chicken Breast')">🍗 Chicken</button>

<button onclick="quickSearch('Egg')">🥚 Egg</button>

<button onclick="quickSearch('Milk')">🥛 Milk</button>

</div>

</section>

<!-- RESULTS -->

<section
class="result-card"
id="result">

<div class="food-header">

<h2 id="foodName">

Search a Food

</h2>

<button id="favoriteBtn">

🤍 Save

</button>

</div>

<div class="health-score">

<div
class="circle"
id="score">

0/100

</div>

<p>

Health Score

</p>

</div>
